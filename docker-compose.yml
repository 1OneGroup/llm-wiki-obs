version: "3.9"

services:
  db:
    image: ankane/pgvector:latest
    container_name: llmwiki-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: llmwiki
      POSTGRES_USER: ${POSTGRES_USER:-llmwiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./harness/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmwiki}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmwiki-mcp
    restart: unless-stopped
    environment:
      PORT: 8080
      VAULT_ROOT: /vault
      POSTGRES_URL: postgresql://${POSTGRES_USER:-llmwiki}:${POSTGRES_PASSWORD}@db:5432/llmwiki
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
    ports:
      - "8080:8080"
    volumes:
      - ${VAULT_PATH:?Set VAULT_PATH in .env}:/vault
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
