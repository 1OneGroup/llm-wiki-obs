services:
  wiki:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmwiki-web
    restart: unless-stopped
    volumes:
      - ${VAULT_PATH:?Set VAULT_PATH in .env}:/vault:ro
    networks:
      - shared-proxy
      - internal

  db:
    image: ankane/pgvector:latest
    container_name: llmwiki-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: llmwiki
      POSTGRES_USER: ${POSTGRES_USER:-llmwiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./harness/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmwiki}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  db_data:

networks:
  shared-proxy:
    external: true
  internal:
    driver: bridge
